<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="round"><rect width="64" height="64" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="64" height="64" fill="#000000"/>

    <!--
      Layout: 3 columns in 64px wide icon
      Col 1 (Hevy):   x=3..22  center=12.5  (20px wide)
      Col 2 (Arrows): x=22..42 center=32    (20px wide)
      Col 3 (Garmin): x=42..61 center=51.5  (20px wide)
      All vertically centered at y=32
    -->

    <!-- Hevy logo — original viewBox 48x48, scale to 20px => 0.417, center at (12.5, 32) -->
    <!-- Offset: 12.5 - 24*0.417 = 12.5 - 10 = 2.5,  32 - 24*0.417 = 32 - 10 = 22 -->
    <g transform="translate(2.5, 22) scale(0.417)">
      <path fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"
        d="m30.4809,29.4472v7.0532c0,1.8395,1.7614,3.167,3.5297,2.6602l6.5242-1.8697c1.5319-.439,2.6119-1.8002,2.6835-3.3921.1205-2.6811.2817-6.8836.2817-10.1869,0-3.1332-.182-6.4889-.3299-8.698-.1004-1.5006-1.0934-2.7908-2.5189-3.2702l-7.4323-2.4993c-1.5709-.5283-3.1969.6404-3.1969,2.2977v4.5241c0,2.6496-1.3709,5.1106-3.6237,6.5052l-4.7966,2.9693c-2.2529,1.3946-3.6237,3.8556-3.6237,6.5052v4.0467c0,1.892-1.8561,3.226-3.6494,2.623l-6.9797-2.3472c-1.4255-.4794-2.4185-1.7696-2.5189-3.2702-.1479-2.2091-.3299-5.5648-.3299-8.698,0-3.3033.1612-7.5058.2817-10.1869.0716-1.5919,1.1516-2.9531,2.6835-3.3921l6.9619-1.9952c1.549-.4439,3.092.719,3.092,2.3304v7.5085"/>
    </g>

    <!-- Sync arrows — centered at (32, 32) -->
    <g transform="translate(32, 32)" fill="none" stroke="#10b981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <!-- Top semicircle arc going right -->
      <path d="M-6,-2 A6,4 0 0,1 6,-2"/>
      <polyline points="4,-5 6,-2 3.5,-1"/>
      <!-- Bottom semicircle arc going left -->
      <path d="M6,2 A6,4 0 0,1 -6,2"/>
      <polyline points="-4,5 -6,2 -3.5,1"/>
    </g>

    <!-- Garmin Connect logo — original viewBox 48x48, scale to 20px => 0.417, center at (51.5, 32) -->
    <!-- Offset: 51.5 - 24*0.417 = 51.5 - 10 = 41.5,  32 - 24*0.417 = 32 - 10 = 22 -->
    <g transform="translate(41.5, 22) scale(0.417)">
      <path fill="none" stroke="#11A9ED" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"
        d="M45,15.38a22.15,22.15,0,0,0-8.4-10A22.29,22.29,0,0,0,9.8,7.78,21.74,21.74,0,0,0,3,20.88h7.4A14.72,14.72,0,0,1,20.7,9.78c7.1-1.9,12.6.7,16.1,5.6Z"/>
      <path fill="none" stroke="#11A9ED" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"
        d="M45,32.58a22,22,0,0,1-39.4,2.2A19.48,19.48,0,0,1,3,27h7.4a14.66,14.66,0,0,0,26.3,5.5Z"/>
    </g>
  </g>
</svg>
